        document.getElementById('modal').classList.remove('show');
    }

    rematch() {
        // 重玩：保持当前技能池，重置游戏状态
        const currentSkills = this.skillManager.getSharedSkills();
        const skillCount = currentSkills.length;

        this.board = Array(15).fill(null).map(() => Array(15).fill(null));
        this.currentPlayer = 'black';
        this.moveHistory = [];
        this.gameOver = false;
        this.hasPlacedThisTurn = false;
        this.usedSkillThisTurn = false;
        this.extraMoves = 0;
        this.extraMoveOwner = null;
        this.frozenCells.clear();
        this.protectedStones.clear();
        this.phantomStones = [];
        this.hiddenMoves = [];
        this.activeSkill = null;
        this.pendingSkillEffect = null;
        this.skillSeal = null;
        this.forcedDefense = null;
        this.forcedPlacement = null;
        this.feintArea = null;
        this.lockedArea = null;
        this.emptyCityArea = null;
        this.baitMove = null;
        this.threatMark = null;
        this.confusion = null;
        this.immuneStones = null;
        this.doubleSkill = null;
        this.stealTurn = null;
        this.skipTurn = false;
        this.bonusEnergyNextTurn = null;
        this.lastUsedSkill = { black: null, white: null };
        // 新技能状态（混战计、并战计、败战计）
        this.restrictedArea = null;
        this.isolatedStoneBonus = null;
        this.permanentImmune = null;
        this.energyPenaltyNextTurn = null;
        this.beautyTrap = null; // 美人计：旧版本陷阱（已废弃）
        this.beautyTrapPending = null; // 美人计：下一颗落子触发效果
        this.neutralStones = []; // 中立棋子（不计入连珠）
        this.forbiddenArea = null;
        this.weakenedStones = new Set();
        this.immunePlayer = null;
        this.playerEnergy = { black: 0, white: 0 };
        // 重置技能冷却但不更换技能
        this.skillManager.resetAll();
        this.initBoard();
        this.renderSkills();
        this.updatePlayerIndicator();
        this.updateEnergyUI();
        this.updateStatus(`黑方回合<br><small>可直接落子或使用技能</small><br><small>🎯 重玩模式 - 相同技能组</small>`);
        document.getElementById('modal').classList.remove('show');
    }

    toggleTestMode() {
        const currentMode = this.skillManager.isTestMode();
        const newMode = !currentMode;
        this.skillManager.setTestMode(newMode);

        // 重置游戏
        this.board = Array(15).fill(null).map(() => Array(15).fill(null));
        this.currentPlayer = 'black';
        this.moveHistory = [];
        this.gameOver = false;
        this.hasPlacedThisTurn = false;
        this.usedSkillThisTurn = false;
        this.extraMoves = 0;
        this.extraMoveOwner = null;
        this.frozenCells.clear();
        this.protectedStones.clear();
        this.phantomStones = [];
        this.hiddenMoves = [];
        this.activeSkill = null;
        this.pendingSkillEffect = null;
        this.skillSeal = null;
        this.forcedDefense = null;
        this.forcedPlacement = null;
        this.feintArea = null;
        this.lockedArea = null;
        this.emptyCityArea = null;
        this.baitMove = null;
        this.threatMark = null;
        this.confusion = null;
        this.immuneStones = null;
        this.doubleSkill = null;
        this.stealTurn = null;
        this.skipTurn = false;
        this.bonusEnergyNextTurn = null;
        this.lastUsedSkill = { black: null, white: null };
        // 新技能状态（混战计、并战计、败战计）
        this.restrictedArea = null;
        this.isolatedStoneBonus = null;
        this.permanentImmune = null;
        this.energyPenaltyNextTurn = null;
        this.beautyTrap = null; // 美人计：旧版本陷阱（已废弃）
        this.beautyTrapPending = null; // 美人计：下一颗落子触发效果
        this.neutralStones = []; // 中立棋子（不计入连珠）
        this.forbiddenArea = null;
        this.weakenedStones = new Set();
        this.immunePlayer = null;
        this.playerEnergy = { black: 0, white: 0 };

        // 测试模式：所有技能 + 满能量
        if (newMode) {
            this.currentSkillPool = this.skillManager.setAllSkills();
            this.playerEnergy = { black: 999, white: 999 };
            this.maxEnergy = 999;
        } else {
            const skillCount = Math.floor(Math.random() * 5) + 6;
            this.currentSkillPool = this.skillManager.setRandomSharedSkills(skillCount);
            this.maxEnergy = 10;
        }

        this.initBoard();
        this.renderSkills();
        this.updatePlayerIndicator();
        this.updateEnergyUI();
        this.updateSkillPoolInfo(this.currentSkillPool.length);
        this.updateTestModeButton();

        if (newMode) {
            this.updateStatus('🧪 测试模式已开启<br><small>所有技能可用，能量无限</small>');
        } else {
            this.updateStatus('黑方回合<br><small>可直接落子或使用技能</small>');
        }
    }

    updateTestModeButton() {
        const btn = document.getElementById('test-mode-btn');
        if (btn) {
            if (this.skillManager.isTestMode()) {
                btn.textContent = '🧪 关闭测试模式';
                btn.classList.add('btn-primary');
                btn.classList.remove('btn-secondary');
            } else {
                btn.textContent = '🧪 开启测试模式';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-secondary');
            }
        }
    }

    renderBoard() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => {
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            const stone = this.board[row][col];
            const oldStone = cell.querySelector('.stone');
            if (oldStone) oldStone.remove();

            // 清除之前的高亮样式
            cell.classList.remove('must-place', 'forbidden-place', 'suggested-place');

            // 检查是否为隐藏落子
            const hidden = this.hiddenMoves.some(h => h.row === row && h.col === col);

            // 检查是否为伪装棋子（暗度陈仓）
            const disguised = this.disguisedStones && this.disguisedStones.find(d => d.row === row && d.col === col);

            // 检查是否为幻想子（无中生有）
            const phantom = this.phantomStones.find(p => p.row === row && p.col === col);

            // ========== 高亮限制落子位置 ==========
            // 围魏救赵：必须落子位置
            if (this.forcedDefense && this.forcedDefense.player === this.currentPlayer && this.forcedDefense.type !== 'neighbor') {
                const isValid = this.forcedDefense.positions.some(p => p.row === row && p.col === col);
                if (isValid) {
                    cell.classList.add('must-place');
                } else if (!stone && !phantom) {
                    cell.classList.add('forbidden-place');
                }
            }
            // 抛砖引玉：必须在落子旁边
            if (this.forcedDefense && this.forcedDefense.player === this.currentPlayer && this.forcedDefense.type === 'neighbor') {
                const isValid = this.forcedDefense.positions.some(p => p.row === row && p.col === col);
                if (isValid) {
                    cell.classList.add('must-place');
                } else if (!stone && !phantom) {
                    cell.classList.add('forbidden-place');
                }
            }
            // 欲擒故纵：必须落子位置
            if (this.forcedPlacement && this.forcedPlacement.player === this.currentPlayer && this.forcedPlacement.type === 'restricted') {
                const isValid = this.forcedPlacement.positions.some(p => p.row === row && p.col === col);
                if (isValid) {
                    cell.classList.add('must-place');
                } else if (!stone && !phantom) {
                    cell.classList.add('forbidden-place');
                }
            }
            // 关门捉贼：限制区域
            if (this.restrictedArea && this.restrictedArea.player === this.currentPlayer) {
                const inArea = this.restrictedArea.area.some(p => p.row === row && p.col === col);
                if (inArea) {
                    cell.classList.add('must-place');
                } else if (!stone && !phantom) {
                    cell.classList.add('forbidden-place');
                }
            }
            // 空城计：禁止区域
            if (this.forbiddenArea && this.forbiddenArea.area.some(p => p.row === row && p.col === col)) {
                cell.classList.add('forbidden-place');
            }
            // 封锁区域限制
            if (this.lockedArea && this.lockedArea.turns > 0) {
                const inArea = Math.abs(row - this.lockedArea.row) <= this.lockedArea.range &&
                              Math.abs(col - this.lockedArea.col) <= this.lockedArea.range;
                if (!inArea && !stone && !phantom) {
                    cell.classList.add('forbidden-place');
                } else if (inArea && !stone && !phantom) {
                    cell.classList.add('must-place');
                }
            }

            // ========== 高亮pending技能的可落子位置 ==========
            if (this.pendingSkillEffect) {
                const effect = this.pendingSkillEffect;

                // 浑水摸鱼：只能移动到相邻空位
                if (effect.type === 'moveStone') {
                    const dr = Math.abs(row - effect.origin.row);
                    const dc = Math.abs(col - effect.origin.col);
                    const isAdjacent = dr + dc === 1;
                    const isEmpty = !stone && !phantom;
                    if (isAdjacent && isEmpty) {
                        cell.classList.add('must-place');
                    } else if (!isAdjacent && isEmpty) {
                        cell.classList.add('forbidden-place');
                    }
                }

                // 金蝉脱壳：可以移动到任意空位
                if (effect.type === 'teleportStone') {
                    if (!stone && !phantom) {
                        cell.classList.add('must-place');
                    }
                }

                // 上屋抽梯：只能移动到相邻空位
                if (effect.type === 'displaceStone') {
                    const dr = Math.abs(row - effect.origin.row);
                    const dc = Math.abs(col - effect.origin.col);
                    const isAdjacent = dr + dc === 1;
                    const isEmpty = !stone && !phantom;
                    if (isAdjacent && isEmpty) {
                        cell.classList.add('must-place');
                    } else if (!isAdjacent && isEmpty) {
                        cell.classList.add('forbidden-place');
                    }
                }

                // 走为上策：可以移动到任意空位
                if (effect.type === 'retreatStone') {
                    if (!stone && !phantom) {
                        cell.classList.add('must-place');
                    }
                }

                // 远交近攻：可以选择删除对方棋子
                if (effect.type === 'removeOpponentStone') {
                    const opponent = this.getOpponent(this.currentPlayer);
                    if (stone === opponent) {
                        cell.classList.add('must-place');
                    }
                }
            }

            // 渲染棋子（包括幻想子）
            if ((stone && !hidden) || phantom) {
                const stoneEl = document.createElement('div');
                // 幻想子使用 phantom.player，否则使用 board 上的 stone
                const actualStone = phantom ? phantom.player : stone;
                // 如果有伪装，显示为伪装颜色，否则显示实际颜色
                const displayColor = disguised ? disguised.displayPlayer : actualStone;
                stoneEl.className = `stone ${displayColor}`;

                // 如果是伪装，添加标记
                if (disguised) {
                    stoneEl.style.border = '2px dashed #ffd700';
                    stoneEl.title = '暗度陈仓：实际为' + (disguised.actualPlayer === 'black' ? '黑方' : '白方');
                }

                // 检查是否为中立棋子
                const isNeutral = this.neutralStones.some(s => s.row === row && s.col === col);
                if (isNeutral) {
                    stoneEl.style.border = '3px solid #888';
                    stoneEl.style.opacity = '0.6';
                    stoneEl.title = '中立棋子：不计入连珠';
                }

                const lastMove = this.moveHistory[this.moveHistory.length - 1];
                if (lastMove && lastMove.row === row && lastMove.col === col) stoneEl.classList.add('last-move');

                // 幻想子特殊样式
                if (phantom) {
                    stoneEl.classList.add('phantom');
                    stoneEl.title = '幻想子（' + (phantom.player === 'black' ? '黑方' : '白方') + '）剩余' + phantom.turns + '回合';
                }

                cell.appendChild(stoneEl);
            }
        });
    }

    renderSkills() {
        const container = document.getElementById('skills-list');
        container.innerHTML = '';
        const skills = this.skillManager.getSharedSkills();
        const currentEnergy = this.getPlayerEnergy(this.currentPlayer);
        const isTestMode = this.skillManager.isTestMode();

        let lastCategory = '';
        skills.forEach(skill => {
            if (skill.category !== lastCategory) {
                const cat = document.createElement('div');
                cat.className = 'skill-category';
                cat.textContent = skill.category;
                container.appendChild(cat);
                lastCategory = skill.category;
            }

            const item = document.createElement('div');
            item.className = 'skill-item';
            if (skill === this.activeSkill) item.classList.add('active');
            // 测试模式下不显示冷却
            if (!isTestMode && skill.currentCooldown > 0) {
                item.classList.add('cooldown');
                item.dataset.cooldown = skill.currentCooldown;
            } else if (!isTestMode && currentEnergy < skill.cost) {
                item.classList.add('insufficient');
            }
            const cdText = (!isTestMode && skill.currentCooldown > 0) ? ` [CD:${skill.currentCooldown}]` : '';
            item.innerHTML = `
                <div class="skill-cost">${skill.cost} 能量</div>
                <div class="skill-name">${skill.icon} ${skill.name}${cdText}</div>
                <div class="skill-desc">${skill.description}</div>
            `;
            item.addEventListener('click', () => this.activateSkill(skill));
            container.appendChild(item);
        });
    }

    activateSkill(skill) {
        const isTestMode = this.skillManager.isTestMode();

        // 检查技能封印（测试模式下也检查封印）
        if (this.skillSeal && this.skillSeal.player === this.currentPlayer) {
            if (this.skillSeal.nextTurnOnly || this.skillSeal.turns > 0) {
                const sealSource = this.skillSeal.sourceSkill || '未知技能';
                this.updateStatus(`❌ 技能被封印！<br>⚠️ ${sealSource}效果`);
                return;
            }
        }

        if (!isTestMode && this.getPlayerEnergy(this.currentPlayer) < skill.cost) {
            this.updateStatus(`能量不足！需要 ${skill.cost} 点能量<br>当前: ${this.getPlayerEnergy(this.currentPlayer)} / ${this.maxEnergy}`);
            return;
        }
        if (!isTestMode && skill.currentCooldown > 0) {
            this.updateStatus(`技能冷却中...还需 ${skill.currentCooldown} 回合<br>⚠️ 公用CD，双方都无法使用`);
            return;
        }
        // 检查技能的canUse条件（如李代桃僵需要对方有四连）
        if (!skill.canUse(this, this.currentPlayer)) {
            this.updateStatus(`❌ 技能条件不满足<br>⚠️ ${skill.name}无法使用`);
            return;
        }
        if (this.activeSkill === skill) {
            this.activeSkill = null;
            this.updateStatus('取消技能');
        } else {
            this.activeSkill = skill;
            this.updateStatus(`已激活: ${skill.name}<br>⚠️ 点击棋盘使用技能，使用后需落子`);
        }
        this.renderSkills();
    }

    showEffect(row, col, text) {
        const layer = document.getElementById('effect-layer');
        const effect = document.createElement('div');
        effect.className = 'effect-text';
        effect.textContent = text;
        effect.style.left = `${col * 36 + 18}px`;
        effect.style.top = `${row * 36}px`;
        layer.appendChild(effect);
        setTimeout(() => effect.remove(), 2000);
    }

    getCellElement(row, col) {
        return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
    }

    updatePlayerIndicator() {
        document.getElementById('black-player').classList.toggle('active', this.currentPlayer === 'black');
        document.getElementById('white-player').classList.toggle('active', this.currentPlayer === 'white');
    }

    updateStatus(text) {
        document.getElementById('game-status').innerHTML = text;
    }

    showWinModal() {
        const winner = this.currentPlayer === 'black' ? '黑方' : '白方';
        document.getElementById('modal-title').textContent = `🎉 ${winner}获胜！`;
        document.getElementById('modal-message').textContent = `恭喜${winner}赢得比赛！`;
        const skillsDiv = document.getElementById('modal-skills');
        skillsDiv.innerHTML = '<div style="margin:10px 0;">本局技能池:</div>' + 
            this.currentSkillPool.map(s => `<span class="skill-tag">${s.icon} ${s.name}</span>`).join('');
        document.getElementById('modal').classList.add('show');
    }

    showDrawModal() {
        document.getElementById('modal-title').textContent = '🤝 平局！';
        document.getElementById('modal-message').textContent = '棋盘已满，双方平局！';
        document.getElementById('modal').classList.add('show');
    }

    // ==================== AI相关方法 ====================

    /**
     * 创建AI实例
     */
    createAIInstance() {
        this.aiInstance = new GomokuAI(this, this.aiPlayer, this.aiDifficulty);
    }

    /**
     * 切换AI模式
     */
    toggleAIMode() {
        this.aiEnabled = !this.aiEnabled;

        const btn = document.getElementById('ai-mode-btn');
        const difficultyNames = {
            'easy': '简单',
            'medium': '中等',
            'hard': '困难',
            'expert': '专家'
        };

        if (this.aiEnabled) {
            btn.textContent = `🤖 AI: 开启 (${difficultyNames[this.aiDifficulty]})`;
            btn.classList.add('btn-primary');
            btn.classList.remove('btn-secondary');
            this.updateStatus(`🤖 AI对战已开启<br>AI执白，玩家执黑<br>难度: ${difficultyNames[this.aiDifficulty]}`);

            // 创建AI实例
            this.createAIInstance();

            // 如果当前是AI回合，触发AI行动
            if (this.currentPlayer === this.aiPlayer && !this.gameOver) {
                setTimeout(() => this.triggerAIAction(), 80);
            }
        } else {
            btn.textContent = '🤖 AI对战: 关闭';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-secondary');
            this.updateStatus('🤖 AI对战已关闭<br>当前为双人对战模式');
            this.aiInstance = null;
        }
    }

    /**
     * 切换AI难度（循环切换）
     */
    setAIDifficulty(difficulty) {
        // 如果没有指定难度，则循环切换
        if (!difficulty) {
            const difficulties = ['easy', 'medium', 'hard'];
            const currentIndex = difficulties.indexOf(this.aiDifficulty);
            const nextIndex = (currentIndex + 1) % difficulties.length;
            difficulty = difficulties[nextIndex];
        }

        this.aiDifficulty = difficulty;

        // 更新按钮文本
        const btn = document.getElementById('ai-difficulty-btn');
        const difficultyNames = {
            'easy': '简单',
            'medium': '中等',
            'hard': '困难',
            'expert': '专家'
        };
        btn.textContent = `🎮 难度: ${difficultyNames[difficulty]}`;

        // 更新AI实例
        if (this.aiEnabled && this.aiInstance) {
            this.createAIInstance();
        }

        // 更新AI模式按钮文本
        if (this.aiEnabled) {
            const aiBtn = document.getElementById('ai-mode-btn');
            aiBtn.textContent = `🤖 AI: 开启 (${difficultyNames[difficulty]})`;
        }

        this.updateStatus(`AI难度已设置为: ${difficultyNames[difficulty]}`);
    }

    /**
     * 切换AI难度（供按钮调用）
     */
    cycleAIDifficulty() {
        this.setAIDifficulty();
    }

    /**
     * 切换AI难度（循环切换）
     */

    /**
     * 触发AI行动
     */
    triggerAIAction() {
        console.log('[Game] triggerAIAction called', {
            aiEnabled: this.aiEnabled,
            aiInstance: this.aiInstance,
            gameOver: this.gameOver,
            currentPlayer: this.currentPlayer,
            aiPlayer: this.aiPlayer
        });

        if (!this.aiEnabled || !this.aiInstance || this.gameOver) return;
        if (this.currentPlayer !== this.aiPlayer) return;

        console.log('[Game] All checks passed, executing AI decision');
        // 执行AI决策
        this.aiInstance.executeDecision();
    }
}
